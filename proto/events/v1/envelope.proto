syntax = "proto3";

package events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/freshworkstudio/kilden-protos/gen/go/events/v1;eventsv1";

// Envelope is Kilden's central wire contract: every event flowing through
// events_raw and events_enriched is a serialized Envelope.
//
// Golden rule (docs/03): the envelope is typed, the letter is not —
// `properties` stays opaque JSON because properties are schema-less by
// product design.
message Envelope {
  // Idempotency key. UUID v7 generated by the client. For events derived
  // from provider webhooks: deterministic UUID v5 of
  // (provider_message_id, record_type, received_at) — see docs/07.
  string uuid = 1;

  string project_id = 2;

  // Event name. "$" prefix = system event ($identify, $pageview,
  // $email_opened, ...). No prefix = customer-defined event.
  string event = 3;

  // Identity as sent by the client. Partition key of events_raw.
  string distinct_id = 4;

  // Empty in events_raw; populated by the enricher after identity
  // resolution. Partition key of events_enriched.
  string person_id = 5;

  // Raw JSON, OPAQUE. Never type this.
  string properties = 6;

  // Event time according to the client, already corrected for clock skew
  // by capture: t_real ≈ t_client + (server_now - sent_at).
  google.protobuf.Timestamp timestamp = 7;

  // When capture received it.
  google.protobuf.Timestamp received_at = 8;

  // Only populated in events_enriched.
  EnrichmentMeta enrichment = 9;

  // Batch-level identity JWT (HS256, per-project secret), propagated
  // verbatim by capture from the Authorization: Bearer header. Verified by
  // the enricher, never by capture — see docs/11.
  string identity_token = 10;

  // Set by capture from the api_key kind: public key = CLIENT,
  // secret key = SERVER.
  EventSource source = 11;

  // Source IP as seen by capture (first X-Forwarded-For hop). TRANSIENT and
  // PII-minimized: it exists only so the enricher can derive Geo. It travels
  // solely in events_raw (Kafka, ≤3d retention) and the enricher CLEARS it
  // before producing events_enriched — never written to PG/CH/S3 nor carried
  // past enrichment. See docs/03 and card c4-geoip.
  string ip = 12;
}

enum EventSource {
  EVENT_SOURCE_UNSPECIFIED = 0;
  EVENT_SOURCE_CLIENT = 1;
  EVENT_SOURCE_SERVER = 2;
}

message EnrichmentMeta {
  Geo geo = 1;
  Device device = 2;

  // Identity verification output (docs/11). Meaningful for identified-user
  // events and identity mutations; anonymous events always pass.
  bool verified = 3;

  // Project verification mode in effect when the enricher evaluated this
  // event. Makes the event self-contained for consumers: verified=false
  // under MONITOR is observe-only, under ENFORCE it must be excluded from
  // sensitive consumers (matcher, messenger) — no project-config lookup.
  VerificationMode verification_mode = 4;
}

enum VerificationMode {
  VERIFICATION_MODE_UNSPECIFIED = 0;
  VERIFICATION_MODE_OFF = 1;
  VERIFICATION_MODE_MONITOR = 2;
  VERIFICATION_MODE_ENFORCE = 3;
}

// Derived via GeoIP from the source IP. The IP is TRANSIENT (see
// Envelope.ip): it is dropped by the enricher and never persisted to the
// query stores (PG/CH/S3). Only this derived Geo lives past enrichment.
message Geo {
  string country_code = 1; // ISO 3166-1 alpha-2, e.g. "CL"
  string region = 2;       // Subdivision level 1 name, e.g. "Región Metropolitana"
  string city = 3;
  string time_zone = 4;    // IANA tz, e.g. "America/Santiago"
}

// Derived from User-Agent parsing in the enricher.
message Device {
  string browser = 1;
  string browser_version = 2;
  string os = 3;
  string os_version = 4;
  DeviceType type = 5;
}

enum DeviceType {
  DEVICE_TYPE_UNSPECIFIED = 0;
  DEVICE_TYPE_DESKTOP = 1;
  DEVICE_TYPE_MOBILE = 2;
  DEVICE_TYPE_TABLET = 3;
  DEVICE_TYPE_BOT = 4;
}
